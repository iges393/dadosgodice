<!DOCTYPE html>
<html>
<head>
    <title>GoDice Haptic Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: #00ff00; }
        button { padding: 20px; font-size: 18px; border-radius: 12px; border: none; cursor: pointer; margin: 10px; width: 85%; font-weight: bold; text-transform: uppercase; }
        .btn-conectar { background: #28a745; color: white; border-bottom: 5px solid #1e7e34; }
        .btn-conectar:active { border-bottom: 2px solid #1e7e34; transform: translateY(3px); }
        .btn-repetir { background: #007bff; color: white; display: none; border-bottom: 5px solid #0056b3; }
        #status { font-size: 18px; margin-top: 20px; color: #ffcc00; padding: 15px; border: 1px dashed #444; min-height: 50px; }
        #lista { font-size: 32px; color: #00e5ff; margin-top: 15px; font-weight: bold; text-shadow: 0 0 10px #00e5ff; }
    </style>
    <!-- Esta es la librería oficial en un enlace ultra-rápido -->
    <script src="https://unpkg.com"></script>
</head>
<body>
    <h1>GoDice Haptic</h1>
    <button id="connect" class="btn-conectar">1. Conectar Dados</button>
    <button id="repeat" class="btn-repetir">Repetir Vibración</button>
    <div id="status">Bluetooth y GPS deben estar encendidos</div>
    <div id="lista"></div>

    <script>
        // Si la librería falla al cargar, intentamos capturar el error
        let goDice;
        try {
            goDice = new GoDice();
        } catch (e) {
            document.getElementById('status').innerText = "Error cargando motor de dados. Recarga la página.";
        }

        let resultados = [];
        let procesando = false;
        let contadorRepeticiones = 0;
        let abortar = false;

        const statusDiv = document.getElementById('status');
        const listaDiv = document.getElementById('lista');
        const btnRepetir = document.getElementById('repeat');

        document.getElementById('connect').onclick = async () => {
            statusDiv.innerText = "Buscando... Selecciona tu dado en la lista";
            try {
                await goDice.requestDevice();
            } catch (e) {
                statusDiv.innerText = "No se seleccionó dado o Bluetooth apagado.";
            }
        };
        
        btnRepetir.onclick = () => {
            if (!procesando) {
                contadorRepeticiones = 0;
                ejecutarVibraciones();
            }
        };

        async function ejecutarVibraciones() {
            if (resultados.length === 0) return;
            procesando = true;
            abortar = false;
            btnRepetir.style.display = "none";

            while (contadorRepeticiones <= 2 && !abortar) {
                statusDiv.innerText = (contadorRepeticiones === 0) ? "Vibrando..." : `Repetición ${contadorRepeticiones}/2`;
                for (let valor of resultados) {
                    if (abortar) break;
                    let patron = [];
                    for (let i = 0; i < valor; i++) { patron.push(250, 200); }
                    if (navigator.vibrate) navigator.vibrate(patron);
                    await new Promise(r => setTimeout(r, 2200 + (valor * 450)));
                }
                if (abortar) break;
                contadorRepeticiones++;
                if (contadorRepeticiones <= 2) {
                    statusDiv.innerText = "Espera de 5s...";
                    await new Promise(r => setTimeout(r, 5000));
                }
            }
            if (!abortar) statusDiv.innerText = "Listo.";
            procesando = false;
            btnRepetir.style.display = "inline-block";
        }

        goDice.onStable = (id, value) => {
            if (!procesando) resultados = [];
            resultados.push(value);
            listaDiv.innerText = resultados.join(" - ");
            clearTimeout(window.timerInicio);
            window.timerInicio = setTimeout(() => {
                contadorRepeticiones = 0;
                ejecutarVibraciones();
            }, 1500);
        };

        goDice.onRollStart = () => {
            abortar = true;
            statusDiv.innerText = "¡Dados rodando!";
        };
        
        goDice.onConnected = () => {
            statusDiv.innerText = "¡DADO CONECTADO!";
            document.getElementById('connect').style.display = "none";
        };
    </script>
</body>
</html>
